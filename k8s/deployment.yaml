apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraudguard-api
  labels:
    app: fraudguard-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraudguard-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: fraudguard-api
    spec:
      containers:
        - name: fraudguard-api
          image: YOUR_DOCKERHUB_USERNAME/fraudguard-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fraudguard-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: fraudguard-secrets
                  key: redis-url
            - name: MODEL_DIR
              value: /app/models
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
